      - generic [ref=e240]:
        - 'button "● Setup: Sit in a circle or line. One person starts, then pass to the next person. Pick a starting sentence: • \"The day I accidentally became the mayor of a small town started with a wrong turn.\" • \"Nobody told me the package would be ticking.\" • \"The dog looked at me like it knew exactly what I''d done.\" • \"I opened the fridge and found a handwritten note that said: Don''t look behind you.\" First person says the opening sentence. Each person adds exactly ONE sentence to continue the story. Go around 3 full times. Rules: Each sentence must connect to the previous one. No killing off characters. No ''and then I woke up'' endings. After: Read the full story back. What moment surprised everyone? Who added the best twist? 10m" [ref=e241]':
          - generic [ref=e242]: ●
          - paragraph [ref=e244]: "Setup: Sit in a circle or line. One person starts, then pass to the next person. Pick a starting sentence: • \"The day I accidentally became the mayor of a small town started with a wrong turn.\" • \"Nobody told me the package would be ticking.\" • \"The dog looked at me like it knew exactly what I'd done.\" • \"I opened the fridge and found a handwritten note that said: Don't look behind you.\" First person says the opening sentence. Each person adds exactly ONE sentence to continue the story. Go around 3 full times. Rules: Each sentence must connect to the previous one. No killing off characters. No 'and then I woke up' endings. After: Read the full story back. What moment surprised everyone? Who added the best twist?"
          - generic [ref=e245]: 10m
        - 'button "○ Setup: One speaker at a time. Everyone else is the audience. Go around the room — everyone gets a turn. The audience picks ONE topic for the speaker: • \"Socks should be worn on your hands, not your feet\" • \"Sleep is a scam invented by mattress companies\" • \"Pigeons are the most intelligent species on Earth\" • \"Brushing your teeth is overrated\" • \"The best meal in the world is plain rice with nothing on it\" The speaker has 10 seconds to think, then argues FOR this position with total conviction for 60 seconds. No laughing, no breaking character. After everyone goes: Who was the most convincing? Not the funniest — the most convincing. What made them believable? 10m" [ref=e246]':
          - generic [ref=e247]: ○
          - paragraph [ref=e249]: "Setup: One speaker at a time. Everyone else is the audience. Go around the room — everyone gets a turn. The audience picks ONE topic for the speaker: • \"Socks should be worn on your hands, not your feet\" • \"Sleep is a scam invented by mattress companies\" • \"Pigeons are the most intelligent species on Earth\" • \"Brushing your teeth is overrated\" • \"The best meal in the world is plain rice with nothing on it\" The speaker has 10 seconds to think, then argues FOR this position with total conviction for 60 seconds. No laughing, no breaking character. After everyone goes: Who was the most convincing? Not the funniest — the most convincing. What made them believable?"
          - generic [ref=e250]: 10m
        - 'button "○ Setup: Work in pairs. One person is the storyteller, the other is the \"hype person.\" Then switch. The storyteller picks a boring event from today or yesterday: • Making tea or coffee • Commuting to work • Doing laundry • Cooking a simple meal • Waiting in a queue Tell the story in 90 seconds. The hype person''s job: react like it''s the most incredible story they''ve ever heard. Gasp. Lean in. Say ''No way!'' and ''Then what happened?!'' Full energy. Then switch roles — new storyteller, new hype person. After both rounds: How did having an enthusiastic audience change your delivery? Did you naturally add more detail, more drama, more pauses? That''s what a real engaged audience does — they pull better performance out of you. 10m" [ref=e251]':
          - generic [ref=e252]: ○
          - paragraph [ref=e254]: "Setup: Work in pairs. One person is the storyteller, the other is the \"hype person.\" Then switch. The storyteller picks a boring event from today or yesterday: • Making tea or coffee • Commuting to work • Doing laundry • Cooking a simple meal • Waiting in a queue Tell the story in 90 seconds. The hype person's job: react like it's the most incredible story they've ever heard. Gasp. Lean in. Say 'No way!' and 'Then what happened?!' Full energy. Then switch roles — new storyteller, new hype person. After both rounds: How did having an enthusiastic audience change your delivery? Did you naturally add more detail, more drama, more pauses? That's what a real engaged audience does — they pull better performance out of you."
          - generic [ref=e255]: 10m
        - 'button "○ Setup: Everyone plays. One person at a time in the spotlight. Each person tells the group 3 facts about themselves — 2 true, 1 false. The twist: you must give a confident 30-second mini-speech defending EACH fact as if it''s absolutely true. Example facts you could use for inspiration: • \"I once got lost in a foreign country for 3 days\" • \"I can solve a Rubik''s cube in under 2 minutes\" • \"I accidentally sent a love letter to my boss\" • \"I''ve been skydiving twice\" • \"I once cooked dinner for 50 people\" After all 3 mini-speeches, the group votes on which one is the lie. What to notice: Who was most convincing on their lie? What made it believable — specific details, genuine emotion, or unshakeable confidence? The best liars use all three. 10m" [ref=e256]':
          - generic [ref=e257]: ○
          - paragraph [ref=e259]: "Setup: Everyone plays. One person at a time in the spotlight. Each person tells the group 3 facts about themselves — 2 true, 1 false. The twist: you must give a confident 30-second mini-speech defending EACH fact as if it's absolutely true. Example facts you could use for inspiration: • \"I once got lost in a foreign country for 3 days\" • \"I can solve a Rubik's cube in under 2 minutes\" • \"I accidentally sent a love letter to my boss\" • \"I've been skydiving twice\" • \"I once cooked dinner for 50 people\" After all 3 mini-speeches, the group votes on which one is the lie. What to notice: Who was most convincing on their lie? What made it believable — specific details, genuine emotion, or unshakeable confidence? The best liars use all three."
          - generic [ref=e260]: 10m
        - 'button "○ Setup: One speaker, one \"conductor,\" everyone else watches. Rotate all three roles. The speaker improvises or recites a 60-second speech on any topic. While speaking, the conductor uses hand signals to control their volume: • Hand raised high = loud (projecting to a large room) • Hand at middle = normal conversation • Hand low = whisper • Hand waving = vary rapidly up and down The conductor changes levels every 10-15 seconds. The speaker must adjust INSTANTLY — without pausing or breaking their sentence. After each round: How smoothly did the speaker transition? Did they maintain their train of thought while adjusting volume? Did the volume changes actually change the emotional impact of what they were saying? This trains the most underused speaking skill: dynamic volume control. Most people speak at one volume forever. A whisper after a shout is more powerful than either alone. 10m" [ref=e261]':
          - generic [ref=e262]: ○
          - paragraph [ref=e264]: "Setup: One speaker, one \"conductor,\" everyone else watches. Rotate all three roles. The speaker improvises or recites a 60-second speech on any topic. While speaking, the conductor uses hand signals to control their volume: • Hand raised high = loud (projecting to a large room) • Hand at middle = normal conversation • Hand low = whisper • Hand waving = vary rapidly up and down The conductor changes levels every 10-15 seconds. The speaker must adjust INSTANTLY — without pausing or breaking their sentence. After each round: How smoothly did the speaker transition? Did they maintain their train of thought while adjusting volume? Did the volume changes actually change the emotional impact of what they were saying? This trains the most underused speaking skill: dynamic volume control. Most people speak at one volume forever. A whisper after a shout is more powerful than either alone."
          - generic [ref=e265]: 10m
        - button [ref=e266]:
          - generic [ref=e267]: ○
          - paragraph [ref=e269]: "Setup: One speaker at a time. Everyone else watches. Rotate after each round. The speaker walks to the front of the room or center of the group. Before speaking, they must: 1. Stand completely still for 5 full seconds 2. Make eye contact with every person in the room — hold each for 2 seconds 3. THEN deliver their opening line Opening lines — pick one: • \"I have a confession to make.\" • \"What I'm about to tell you changed everything.\" • \"Three weeks ago, I made the worst decision of my life.\" • \"Nobody in this room knows this about me.\" After the opening line, speak for 60 seconds on anything — the content doesn't matter. The exercise is about owning the silence before you speak. Audience watches for: Did they rush the silence? Did they actually make eye contact or fake it? Did the pause make the opening more powerful? After everyone goes: Who owned the silence best? What did it feel like to wait?"
          - generic [ref=e270]: 10m
        - 'button "○ Setup: Two debaters, everyone else judges. Rotate pairs so everyone debates. Pick ONE topic: • \"Is it better to be honest or kind when they conflict?\" • \"Should you always follow your passion for work?\" • \"Is social media a net positive for society?\" • \"Would you rather be feared or loved as a leader?\" • \"Is it better to have loved and lost, or never loved at all?\" Round 1: Person A argues FOR, Person B argues AGAINST. 90 seconds each. Round 2: SWITCH SIDES. Person A now argues AGAINST, Person B argues FOR. 90 seconds each. Judges: Which side was argued better overall? Who improved most when they switched sides? The side-switch is where the real learning happens — arguing against your own belief forces genuine understanding of the other position. 10m" [ref=e271]':
          - generic [ref=e272]: ○
          - paragraph [ref=e274]: "Setup: Two debaters, everyone else judges. Rotate pairs so everyone debates. Pick ONE topic: • \"Is it better to be honest or kind when they conflict?\" • \"Should you always follow your passion for work?\" • \"Is social media a net positive for society?\" • \"Would you rather be feared or loved as a leader?\" • \"Is it better to have loved and lost, or never loved at all?\" Round 1: Person A argues FOR, Person B argues AGAINST. 90 seconds each. Round 2: SWITCH SIDES. Person A now argues AGAINST, Person B argues FOR. 90 seconds each. Judges: Which side was argued better overall? Who improved most when they switched sides? The side-switch is where the real learning happens — arguing against your own belief forces genuine understanding of the other position."
          - generic [ref=e275]: 10m
        - 'button "○ Setup: 3-5 people in a circle. One person makes a statement, the next person must argue against it. Starting statements — pick one, or the first person makes their own: • \"Everyone should learn to code\" • \"Working from home is better than office work\" • \"University education is overvalued\" • \"AI will replace most jobs within 20 years\" • \"Money can buy happiness\" Person 1 states the position (30 seconds). Person 2 argues against it (60 seconds). Person 3 argues against Person 2''s position (60 seconds). Continue around the circle. Each person MUST argue against whatever the previous person just said — even if they personally agree with it. After 2 full rounds: Which counter-argument was strongest? What''s the difference between disagreeing with an idea and attacking the person? Who found the most unexpected angle? 10m" [ref=e276]':
          - generic [ref=e277]: ○
          - paragraph [ref=e279]: "Setup: 3-5 people in a circle. One person makes a statement, the next person must argue against it. Starting statements — pick one, or the first person makes their own: • \"Everyone should learn to code\" • \"Working from home is better than office work\" • \"University education is overvalued\" • \"AI will replace most jobs within 20 years\" • \"Money can buy happiness\" Person 1 states the position (30 seconds). Person 2 argues against it (60 seconds). Person 3 argues against Person 2's position (60 seconds). Continue around the circle. Each person MUST argue against whatever the previous person just said — even if they personally agree with it. After 2 full rounds: Which counter-argument was strongest? What's the difference between disagreeing with an idea and attacking the person? Who found the most unexpected angle?"
          - generic [ref=e280]: 10m
        - 'button "○ Setup: One performer at a time. Everyone else watches and guesses. Rotate. The performer must communicate ONE of these scenarios using ONLY body language, facial expressions, and gestures — absolutely no words or sounds: • \"I just won the lottery but I''m trying to act normal\" • \"I''m at a job interview and my chair is slowly breaking\" • \"I''m giving a wedding toast but I forgot the groom''s name\" • \"I''m a chef whose dish just got sent back for the third time\" • \"I''m on a video call and just realized my camera has been on the whole time\" Perform for 60 seconds. The audience guesses which scenario it was. After everyone goes: Who was most expressive? What specific gestures communicated the most? This exercise proves that over half of communication is body language — and most people dramatically underuse it when speaking. 10m" [ref=e281]':
          - generic [ref=e282]: ○
          - paragraph [ref=e284]: "Setup: One performer at a time. Everyone else watches and guesses. Rotate. The performer must communicate ONE of these scenarios using ONLY body language, facial expressions, and gestures — absolutely no words or sounds: • \"I just won the lottery but I'm trying to act normal\" • \"I'm at a job interview and my chair is slowly breaking\" • \"I'm giving a wedding toast but I forgot the groom's name\" • \"I'm a chef whose dish just got sent back for the third time\" • \"I'm on a video call and just realized my camera has been on the whole time\" Perform for 60 seconds. The audience guesses which scenario it was. After everyone goes: Who was most expressive? What specific gestures communicated the most? This exercise proves that over half of communication is body language — and most people dramatically underuse it when speaking."
          - generic [ref=e285]: 10m
        - 'button "○ Setup: One pitcher at a time. Everyone else is the \"investor panel.\" Rotate. The audience gives the pitcher TWO random items that must be combined into a product. Pick from this list: • A pillow + a calendar • Sunglasses + a toaster • A bicycle + a library • Shoes + a weather forecast • A mirror + a cookbook The pitcher has 15 seconds to think, then delivers a 90-second investor pitch. The pitch MUST include: 1. A product name 2. What problem it solves 3. Why people would buy it 4. A price After the pitch, each investor asks ONE tough question. The pitcher must answer on the spot — no dodging. After everyone goes: Whose product would you actually buy? Who handled the tough questions best? The skill here is structured thinking under absurd constraints — exactly what happens in real high-pressure presentations. 10m" [ref=e286]':
