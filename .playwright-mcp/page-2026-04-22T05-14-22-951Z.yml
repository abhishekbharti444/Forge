          - paragraph [ref=e289]: "Setup: One pitcher at a time. Everyone else is the \"investor panel.\" Rotate. The audience gives the pitcher TWO random items that must be combined into a product. Pick from this list: • A pillow + a calendar • Sunglasses + a toaster • A bicycle + a library • Shoes + a weather forecast • A mirror + a cookbook The pitcher has 15 seconds to think, then delivers a 90-second investor pitch. The pitch MUST include: 1. A product name 2. What problem it solves 3. Why people would buy it 4. A price After the pitch, each investor asks ONE tough question. The pitcher must answer on the spot — no dodging. After everyone goes: Whose product would you actually buy? Who handled the tough questions best? The skill here is structured thinking under absurd constraints — exactly what happens in real high-pressure presentations."
